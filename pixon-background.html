<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixOn Background</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:linear-gradient(160deg,#FFF5E0 0%,#FFCC4D 20%,#F5A623 45%,#F08C19 65%,#E87A10 85%,#D4680A 100%);
  position:relative;
  font-family:system-ui,sans-serif;
}

/* Sunburst rays from center */
.sunburst{
  position:absolute;inset:0;
  background:conic-gradient(
    from 0deg at 50% 50%,
    rgba(255,255,255,0.08) 0deg,
    transparent 8deg,
    transparent 20deg,
    rgba(255,255,255,0.08) 20deg,
    transparent 28deg,
    transparent 40deg,
    rgba(255,255,255,0.08) 40deg,
    transparent 48deg,
    transparent 60deg,
    rgba(255,255,255,0.08) 60deg,
    transparent 68deg,
    transparent 80deg,
    rgba(255,255,255,0.08) 80deg,
    transparent 88deg,
    transparent 100deg,
    rgba(255,255,255,0.08) 100deg,
    transparent 108deg,
    transparent 120deg,
    rgba(255,255,255,0.08) 120deg,
    transparent 128deg,
    transparent 140deg,
    rgba(255,255,255,0.08) 140deg,
    transparent 148deg,
    transparent 160deg,
    rgba(255,255,255,0.08) 160deg,
    transparent 168deg,
    transparent 180deg,
    rgba(255,255,255,0.08) 180deg,
    transparent 188deg,
    transparent 200deg,
    rgba(255,255,255,0.08) 200deg,
    transparent 208deg,
    transparent 220deg,
    rgba(255,255,255,0.08) 220deg,
    transparent 228deg,
    transparent 240deg,
    rgba(255,255,255,0.08) 240deg,
    transparent 248deg,
    transparent 260deg,
    rgba(255,255,255,0.08) 260deg,
    transparent 268deg,
    transparent 280deg,
    rgba(255,255,255,0.08) 280deg,
    transparent 288deg,
    transparent 300deg,
    rgba(255,255,255,0.08) 300deg,
    transparent 308deg,
    transparent 320deg,
    rgba(255,255,255,0.08) 320deg,
    transparent 328deg,
    transparent 340deg,
    rgba(255,255,255,0.08) 340deg,
    transparent 348deg,
    transparent 360deg
  );
  animation:spinSlow 60s linear infinite;
}

/* Center glow */
.center-glow{
  position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:70vmax;height:70vmax;
  background:radial-gradient(circle,rgba(255,240,200,0.5) 0%,rgba(255,210,100,0.2) 30%,transparent 65%);
  border-radius:50%;
}

/* Halftone dot pattern */
.halftone{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.12) 1px,transparent 1px);
  background-size:12px 12px;
  mask-image:radial-gradient(ellipse at center,transparent 20%,black 70%);
  -webkit-mask-image:radial-gradient(ellipse at center,transparent 20%,black 70%);
}

/* Corner light streaks */
.streak{
  position:absolute;
  background:linear-gradient(135deg,rgba(255,255,255,0.35),rgba(255,255,255,0));
  border-radius:50%;
  filter:blur(30px);
}
.streak-1{top:-10%;left:-5%;width:45%;height:40%;transform:rotate(-15deg)}
.streak-2{bottom:-8%;right:-5%;width:40%;height:35%;transform:rotate(160deg);opacity:0.5}

/* Sparkles ✦ */
.sparkles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sparkle{
  position:absolute;
  color:rgba(255,255,255,0.7);
  font-size:20px;
  animation:twinkle 3s ease-in-out infinite;
  text-shadow:0 0 12px rgba(255,255,255,0.5);
}

/* Game controller D-pad shapes */
.game-elements{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.game-el{
  position:absolute;
  border:2px solid rgba(255,255,255,0.12);
  border-radius:6px;
  animation:floatEl linear infinite;
}
.game-el.circle{border-radius:50%}
.game-el.diamond{transform:rotate(45deg);border-radius:4px}
.game-el.cross{
  border:none;
  width:20px !important;height:20px !important;
}
.game-el.cross::before,.game-el.cross::after{
  content:'';position:absolute;
  background:rgba(255,255,255,0.12);border-radius:2px;
}
.game-el.cross::before{width:100%;height:6px;top:50%;transform:translateY(-50%)}
.game-el.cross::after{width:6px;height:100%;left:50%;transform:translateX(-50%)}
.game-el.triangle{
  border:none;
  width:0 !important;height:0 !important;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-bottom:18px solid rgba(255,255,255,0.12);
  border-radius:0;
}
.game-el.puzzle{
  border:none;
  width:24px !important;height:24px !important;
  background:rgba(255,255,255,0.1);
  border-radius:4px;
  position:relative;
}
.game-el.puzzle::after{
  content:'';position:absolute;
  width:10px;height:10px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  top:-5px;left:50%;transform:translateX(-50%);
}

/* Soft vignette (warm edges) */
.warm-vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(200,100,0,0.15) 100%);
}

@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes twinkle{
  0%,100%{opacity:0.3;transform:scale(0.7) rotate(0deg)}
  50%{opacity:1;transform:scale(1.2) rotate(20deg)}
}
@keyframes floatEl{
  0%{transform:translateY(0) rotate(var(--rot,0deg));opacity:0.6}
  50%{opacity:1}
  100%{transform:translateY(-120vh) rotate(calc(var(--rot,0deg) + 180deg));opacity:0}
}
</style>
</head>
<body>

<div class="sunburst"></div>
<div class="center-glow"></div>
<div class="streak streak-1"></div>
<div class="streak streak-2"></div>
<div class="halftone"></div>
<div class="sparkles" id="sparkles"></div>
<div class="game-elements" id="gameEl"></div>
<div class="warm-vignette"></div>

<script>
// Sparkles
const sp=document.getElementById('sparkles');
const chars=['✦','✧','⬥','✶','✴'];
for(let i=0;i<18;i++){
  const s=document.createElement('div');
  s.className='sparkle';
  s.textContent=chars[i%chars.length];
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.fontSize=(14+Math.random()*22)+'px';
  s.style.animationDuration=(2+Math.random()*4)+'s';
  s.style.animationDelay=(-Math.random()*4)+'s';
  sp.appendChild(s);
}

// Game elements floating up
const ge=document.getElementById('gameEl');
const shapes=['circle','diamond','cross','triangle','puzzle',''];
for(let i=0;i<20;i++){
  const el=document.createElement('div');
  const shape=shapes[i%shapes.length];
  el.className='game-el '+shape;
  const size=12+Math.random()*20;
  if(!shape.match(/cross|triangle|puzzle/)){
    el.style.width=size+'px';
    el.style.height=size+'px';
  }
  el.style.left=Math.random()*100+'%';
  el.style.bottom='-5%';
  el.style.setProperty('--rot',(Math.random()*360)+'deg');
  el.style.animationDuration=(10+Math.random()*18)+'s';
  el.style.animationDelay=(-Math.random()*20)+'s';
  ge.appendChild(el);
}
</script>

</body>
</html>
